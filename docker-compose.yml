version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dockercrafter-backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # 预留证书挂载路径 (如连接远程 Docker Daemon)
      # - ./certs:/app/certs
    # environment:
      # 支持通过环境变量注入 Base64 编码的证书，无需在宿主机保存证书文件 (推荐)
      # - DOCKER_CA_CERT_BASE64=${DOCKER_CA_CERT_BASE64}
      # - DOCKER_CLIENT_CERT_BASE64=${DOCKER_CLIENT_CERT_BASE64}
      # - DOCKER_CLIENT_KEY_BASE64=${DOCKER_CLIENT_KEY_BASE64}
    # We do NOT publish the port 12581 to the host to keep it secure.
    # Nginx in the frontend container will proxy to it via the internal network.
    networks:
      - dockercrafter-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dockercrafter-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "12580:80"
    depends_on:
      - backend
    networks:
      - dockercrafter-net

networks:
  dockercrafter-net:
    driver: bridge
