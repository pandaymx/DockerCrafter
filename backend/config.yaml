# Docker Dev Panel Backend Configuration
port: "12581"
log_level: "INFO"       # 可选：DEBUG, INFO, WARN, ERROR

# CORS (跨域请求) 配置
# allow_origin 默认限定为常见开发端口以确保安全。支持逗号分隔多个来源。
# 生产环境中由于使用 Nginx 同源反向代理，无需配置此项，留空或使用默认值即可。
cors:
  allow_origin: "http://localhost:12580,http://localhost:5173"
  allow_methods: "GET, POST, OPTIONS, PUT, DELETE"
  allow_headers: "Content-Type"

# 多个 Docker 实例连接配置 (支持本地、远程和加密远程连接)
docker_engines:
  - name: "local"
    host: ""             # 为空时表示自动识别本地环境 (WSL2 / Unix Socket / Named Pipe)

  # 远程 Docker 守护进程配置示例（按需取消注释并配置）
  # - name: "remote-dev"
  #   host: "tcp://192.168.1.100:2375"
  #   tls_verify: false

  # - name: "remote-prod"
  #   host: "tcp://192.168.1.200:2376"
  #   tls_verify: true
  #   cert_path: "/home/panda/certs/prod" # 包含 ca.pem, cert.pem, key.pem 证书

  # 现代云原生推荐方案：通过 Base64 编码在内存中直接注入 TLS 证书 (推荐配合环境变量使用)
  # - name: "remote-cloud"
  #   host: "tcp://192.168.1.201:2376"
  #   tls_verify: true
  #   ca_cert_base64: "${DOCKER_CA_CERT_BASE64}"
  #   client_cert_base64: "${DOCKER_CLIENT_CERT_BASE64}"
  #   client_key_base64: "${DOCKER_CLIENT_KEY_BASE64}"
